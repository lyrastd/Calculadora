name: Build Windows App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./csharp
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Install Inno Setup
        run: choco install innosetup
      - name: Build Installer
        run: iscc setup.iss
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Calculadora-Windows
          path: |
            csharp/bin/Release/net8.0-windows/win-x64/publish/CalculadoraApp.exe
            csharp/Setup_Calculadora.exe